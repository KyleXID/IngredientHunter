spring.application.name=ingredient-hunter

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ingredient_hunter}
spring.datasource.username=${DB_USER:ingredient}
spring.datasource.password=${DB_PASSWORD:ingredient}

# Flyway가 스키마를 관리한다. JPA는 검증만(자동 생성 금지).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true

management.endpoints.web.exposure.include=health,info

# 분석(비전 LLM) — 우선순위: Gemini(무료, 연습용) > Anthropic > 데모. 키는 환경변수/.env로 주입.
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-flash-latest}
anthropic.api-key=${ANTHROPIC_API_KEY:}
anthropic.model=${ANTHROPIC_MODEL:claude-sonnet-5}
