services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: ingredient_hunter
      POSTGRES_USER: ingredient
      POSTGRES_PASSWORD: ingredient
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ingredient -d ingredient_hunter"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
